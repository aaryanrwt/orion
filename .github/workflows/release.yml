name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Draft Release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.22'
        cache: true

    - name: Compile Cross-Platform Binaries
      run: |
        mkdir -p dist
        
        # Build Linux
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/orion-linux-amd64 ./cmd/orion
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/orion-linux-arm64 ./cmd/orion
        
        # Build macOS
        GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/orion-darwin-amd64 ./cmd/orion
        GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/orion-darwin-arm64 ./cmd/orion
        
        # Build Windows
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/orion-windows-amd64.exe ./cmd/orion
        GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o dist/orion-windows-arm64.exe ./cmd/orion

    - name: Create Draft Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/orion-linux-amd64
          dist/orion-linux-arm64
          dist/orion-darwin-amd64
          dist/orion-darwin-arm64
          dist/orion-windows-amd64.exe
          dist/orion-windows-arm64.exe
        draft: true
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
