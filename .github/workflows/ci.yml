name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.22'
        cache: true

    - name: Verify go.mod Tidy
      run: |
        go mod tidy
        git diff --exit-code

    - name: Format Check
      run: |
        go fmt ./...
        git diff --exit-code

    - name: Static Analysis (go vet)
      run: go vet ./...

  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.22']

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Build Orion CLI
      run: go build -v -o orion-bin ./cmd/orion

    - name: Run Tests (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Run Tests (Windows - standard)
      if: matrix.os == 'windows-latest'
      run: go test -v -coverprofile=coverage.txt -covermode=atomic ./...
